<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Netlist Graph Builder</title>
    <link rel="stylesheet" href="./styles.css">
    <script src="./vendor/elkjs-0.11.1/lib/elk.bundled.js"></script>
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div class="brand">
          <span class="brand-mark">NGB</span>
          <span class="brand-title">Netlist Graph Builder</span>
        </div>
        <label class="file-button" title="打开 structural Verilog 网表">
          <input id="fileInput" type="file" accept=".v,.sv,.txt">
          打开网表
        </label>
        <button id="pasteNetlistButton" class="icon-button compact-button" type="button" title="粘贴一段 structural Verilog 网表">Paste</button>
        <label class="file-button" title="导入 LocResyn 时序信息">
          <input id="timingInput" type="file" accept=".log,.txt">
          导入时序
        </label>
        <label class="toolbar-field">
          <span>Module</span>
          <select id="moduleSelect"></select>
        </label>
        <button id="compareButton" class="icon-button" type="button" title="进入双 module 对比视图">Compare</button>
        <label class="toolbar-field layout-provider-field"><span>Layout</span><select id="layoutProviderSelect"></select></label>
        <label class="toolbar-field wire-spacing-field" title="调整平行 net 走线间距">
          <span>Wire spacing</span>
          <input id="wireSpacingInput" type="range" min="8" max="40" step="1" value="18">
          <output id="wireSpacingValue">18</output>
        </label>
        <button id="fitButton" class="icon-button" type="button" title="适配视图">Fit</button>
        <button id="exportSvgButton" class="icon-button" type="button" title="导出当前 schematic SVG">SVG</button>
        <button id="adjustLayoutButton" class="icon-button" type="button" title="切换布局校准模式">Adjust</button>
        <button id="saveGoldenButton" class="icon-button" type="button" title="导出当前布局 Golden">Save G</button>
        <label class="file-button compact-button" title="载入当前网表对应的布局 Golden">
          <input id="goldenInput" type="file" accept=".json,application/json">
          Load G
        </label>
        <button id="resetLayoutButton" class="icon-button" type="button" title="清除手动布局调整">Reset</button>
      </header>

      <section class="workspace">
        <aside class="side-panel">
          <section class="panel-section view-panel">
            <h2>View</h2>
            <div class="view-mode-control" role="group" aria-label="Schematic view mode">
              <button id="wholeViewButton" type="button">Whole</button>
              <button id="faninViewButton" type="button">Fanin</button>
              <button id="fanoutViewButton" type="button">Fanout</button>
            </div>
            <label class="cone-depth-field" for="coneDepthInput">
              <span>Depth</span>
              <input id="coneDepthInput" type="number" min="1" max="99" step="1" value="3">
            </label>
            <label class="alias-toggle" for="showAliasesInput">
              <input id="showAliasesInput" type="checkbox">
              <span>Show aliases</span>
            </label>
            <label class="alias-toggle" for="fanoutHubsInput"><input id="fanoutHubsInput" type="checkbox" checked><span>Fanout hubs</span></label>
            <label class="alias-toggle" for="collapseGroupsInput"><input id="collapseGroupsInput" type="checkbox" checked><span>Collapse large groups</span></label>
            <button id="collapseAllButton" class="mini-button" type="button">Collapse all groups</button>
          </section>
          <section id="comparePanel" class="panel-section compare-panel" hidden>
            <h2>Module Compare</h2>
            <label><span>Left</span><select id="leftModuleSelect"></select></label>
            <label><span>Right</span><select id="rightModuleSelect"></select></label>
            <div class="compare-actions">
              <button id="applyCompareButton" class="mini-button" type="button">Apply</button>
              <button id="exitCompareButton" class="mini-button" type="button">Single</button>
            </div>
            <label class="alias-toggle"><input id="syncCompareInput" type="checkbox" checked><span>Sync pan / zoom</span></label>
            <label><span>Layout</span><select id="compareLayoutSelect"><option value="vertical">Top / Bottom</option><option value="horizontal">Left / Right</option></select></label>
            <label><span>Output cone</span><select id="compareOutputSelect"><option value="">Whole module</option></select></label>
          </section>
          <section class="panel-section search-panel">
            <label class="search-label" for="searchInput">Search</label>
            <div class="search-box">
              <input id="searchInput" type="search" placeholder="Module, port, net, instance" autocomplete="off" aria-controls="searchResults" aria-autocomplete="list">
              <button id="searchClearButton" class="search-clear" type="button" title="清除搜索" aria-label="清除搜索" hidden>&times;</button>
            </div>
            <div id="searchResults" class="search-results" role="listbox" hidden></div>
          </section>
          <section class="panel-section">
            <h2>Design</h2>
            <dl id="designStats" class="stats-list"></dl>
          </section>
          <section class="panel-section">
            <h2>Selection</h2>
            <div id="selectionDetails" class="details-empty">未选择对象</div>
          </section>
          <section class="panel-section">
            <h2>Diagnostics</h2>
            <ul id="diagnosticsList" class="diagnostics-list"></ul>
          </section>
        </aside>

        <div id="sidebarResizeHandle" class="sidebar-resize-handle" role="separator" aria-label="调整侧栏宽度" aria-orientation="vertical" aria-valuemin="240" aria-valuemax="640" aria-valuenow="300" tabindex="0"></div>

        <section id="canvas" class="canvas" aria-label="schematic canvas">
          <div id="schematicMount" class="schematic-mount"></div>
          <div id="compareMount" class="compare-mount" hidden>
            <section class="compare-side" data-compare-side="left"><header>Left</header><div id="leftSchematicMount" class="schematic-mount"></div></section>
            <section class="compare-side" data-compare-side="right"><header>Right</header><div id="rightSchematicMount" class="schematic-mount"></div></section>
          </div>
        </section>
      </section>

      <footer id="statusBar" class="status-bar">Ready</footer>
    </main>

    <dialog id="netlistTextDialog" class="text-input-dialog" aria-labelledby="netlistTextTitle">
      <form id="netlistTextForm" class="text-input-form">
        <header>
          <div>
            <h2 id="netlistTextTitle">Paste Verilog</h2>
            <p>粘贴 structural Verilog，解析成功后立即画图。</p>
          </div>
          <button id="closeNetlistTextButton" class="dialog-close" type="button" aria-label="关闭">&times;</button>
        </header>
        <textarea id="netlistTextInput" aria-label="Verilog netlist text" placeholder="module example (input a, output y);&#10;  BUF u0 (.A(a), .Y(y));&#10;endmodule" spellcheck="false" required></textarea>
        <footer>
          <span>Ctrl + Enter 快速画图</span>
          <div>
            <button id="cancelNetlistTextButton" class="dialog-button" type="button">Cancel</button>
            <button class="dialog-button primary" type="submit">Draw</button>
          </div>
        </footer>
      </form>
    </dialog>

    <script type="module" src="./src/app/main.js"></script>
  </body>
</html>
